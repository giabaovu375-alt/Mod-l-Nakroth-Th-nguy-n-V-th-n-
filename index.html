<!DOCTYPE html>
<html lang="vi">
<head>

 <style>
        /* Reset cơ bản để tránh tràn màn hình */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Chống cuộn ngang */
        }

        .avatar-container {
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            object-fit: cover;
        }

        .main-container {
            background: rgba(18, 18, 18, 0.95);
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 20px;
            width: 92%; /* Đảm bảo không tràn màn hình */
            max-width: 450px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 30px;
        }

        .site-title {
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: bold;
        }
        .site-subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        /* Nút Download */
        .download-btn {
            background: linear-gradient(45deg, #ff0000, #b30000);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        /* Nút Video hướng dẫn */
        .video-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .video-btn:hover { background: #fff; }

        /* Bảng mật khẩu */
        .password-box {
            background-color: #151515;
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .password-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .password-value {
            color: #ff4d4d;
            font-size: 22px;
            font-weight: bold;
        }

        /* Donate */
        .donate-section {
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        .donate-text {
            color: #777;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 12px;
        }
        .qr-code-container {
            background: white;
            padding: 8px;
            border-radius: 12px;
            display: inline-block;
        }
        .qr-code {
            width: 100%;
            max-width: 180px;
            height: auto;
            display: block;
        }

    </style>
</head>
<body>

    <div class="avatar-container">
